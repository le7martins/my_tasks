<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>My Tasks v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    button {
      background: #1f1f1f;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .filters button {
      margin-right: 5px;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    .card.done {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .card.late {
      border-left: 5px solid red;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      margin-top: 5px;
    }

    .badge {
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 11px;
      margin-left: 5px;
    }

    .alta { background: red; }
    .media { background: orange; }
    .baixa { background: green; }

    .actions {
      margin-top: 10px;
    }

    .actions button {
      margin-right: 5px;
      font-size: 12px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }

    input, select {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

  </style>
</head>
<body>

<header>📋 My Tasks</header>

<div class="container">

  <div class="top-bar">
    <div>✔ Concluídas hoje: <span id="doneToday">0</span></div>
    <button onclick="openModal()">+ Nova</button>
  </div>

  <div class="filters">
    <button onclick="setFilter('all')">Todas</button>
    <button onclick="setFilter('pending')">Pendentes</button>
    <button onclick="setFilter('done')">Concluídas</button>
  </div>

  <div id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nova Tarefa</h3>
    <input type="text" id="titulo" placeholder="Título">
    <input type="date" id="data">
    <select id="prioridade">
      <option value="alta">Alta</option>
      <option value="media">Média</option>
      <option value="baixa">Baixa</option>
    </select>
    <button onclick="addTask()">Salvar</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
let filter = "all";

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function addTask() {
  const titulo = document.getElementById("titulo").value;
  const data = document.getElementById("data").value;
  const prioridade = document.getElementById("prioridade").value;

  if (!titulo) return;

  tasks.push({
    id: Date.now(),
    titulo,
    data,
    prioridade,
    status: "pendente",
    createdAt: new Date().toISOString()
  });

  save();
  closeModal();
  render();
}

function toggle(id) {
  tasks = tasks.map(t => {
    if (t.id === id) {
      t.status = t.status === "pendente" ? "concluido" : "pendente";
    }
    return t;
  });
  save();
  render();
}

function removeTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function setFilter(f) {
  filter = f;
  render();
}

function isLate(task) {
  if (!task.data) return false;
  return new Date(task.data) < new Date() && task.status !== "concluido";
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = tasks;

  if (filter === "pending") {
    filtered = tasks.filter(t => t.status === "pendente");
  }
  if (filter === "done") {
    filtered = tasks.filter(t => t.status === "concluido");
  }

  let today = new Date().toISOString().slice(0,10);
  let doneToday = tasks.filter(t => t.status === "concluido" && t.createdAt?.slice(0,10) === today).length;
  document.getElementById("doneToday").innerText = doneToday;

  filtered.forEach(task => {
    const div = document.createElement("div");
    div.className = "card";

    if (task.status === "concluido") div.classList.add("done");
    if (isLate(task)) div.classList.add("late");

    div.innerHTML = `
      <div class="title">${task.titulo}</div>
      <div class="meta">
        ${task.data || "Sem data"}
        <span class="badge ${task.prioridade}">${task.prioridade}</span>
      </div>
      <div class="actions">
        <button onclick="toggle(${task.id})">✔</button>
        <button onclick="removeTask(${task.id})">🗑</button>
      </div>
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
